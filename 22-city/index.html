<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>市長シミュレーター：完全版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg-color: #1a1a1a;
            --container-bg: #2c3e50;
            --text-color: #ecf0f1;
            --accent-color: #3498db;
            --border-color: #7f8c8d;
            --crt-green: #33ff33;
            --crt-bg: #0d1a0d;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'DotGothic16', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            padding: 0;
        }

        .game-container {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 600px;
            height: 100dvh;
            max-height: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
        }

        @media (min-width: 601px) {
            .game-container {
                height: 95vh;
                border: 4px solid var(--border-color);
                box-shadow: 8px 8px 0px #000;
                border-radius: 4px;
            }
        }

        /* --- スタート画面 --- */
        .start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.98);
            z-index: 300;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            color: white;
        }
        
        .start-btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'DotGothic16', sans-serif;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            cursor: pointer;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- ニュースティッカー --- */
        .news-ticker-container {
            background-color: #000;
            color: #f1c40f;
            padding: 4px 0;
            border-top: 2px solid #f39c12;
            border-bottom: 2px solid #f39c12;
            overflow: hidden;
            font-size: 0.85rem;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .news-ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 15s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* --- ヘッダー --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 5px;
            flex-shrink: 0;
        }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        
        .mayor-icon {
            width: 36px; height: 36px;
            border: 2px solid #fff; border-radius: 50%;
            background-color: #000;
            object-fit: cover;
        }

        h1 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }

        .turn-badge {
            background-color: #e67e22;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .bgm-btn {
            background: none; border: none; font-size: 1.2rem; cursor: pointer;
            position: absolute; top: 12px; right: 10px; z-index: 20;
        }

        /* --- ステータスバー --- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #222;
            padding: 6px;
            border: 2px solid #7f8c8d;
            flex-shrink: 0;
        }
        .stat-box { text-align: center; flex: 1; border-right: 1px solid #444; }
        .stat-box:last-child { border-right: none; }
        .stat-label { font-size: 0.65em; color: #aaa; margin-bottom: 1px; }
        .stat-value { font-size: 1.1em; font-weight: bold; color: #fff; }

        /* --- CRT ログ画面 --- */
        .screen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            border: 4px inset #555;
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        .screen {
            background-color: var(--crt-bg);
            color: var(--crt-green);
            padding: 15px;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.5;
            font-family: 'VT323', 'Courier New', monospace;
            text-shadow: 0 0 2px rgba(51, 255, 51, 0.7);
            -webkit-overflow-scrolling: touch;
        }

        .screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.02; }
            50% { opacity: 0.05; }
            100% { opacity: 0.02; }
        }

        .screen p { margin: 0 0 8px 0; border-bottom: 1px solid #1a331a; padding-bottom: 2px; position: relative; z-index: 1;}
        .screen p::before { content: "> "; color: #1a1; }

        .cursor {
            display: inline-block;
            width: 0.6em;
            height: 1em;
            background-color: var(--crt-green);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- 操作ボタン --- */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        button.choice-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-bottom: 3px solid #2980b9;
            padding: 12px 10px;
            font-family: 'DotGothic16', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            border-radius: 4px;
            line-height: 1.2;
            transition: all 0.1s;
        }

        button.choice-btn:active {
            border-bottom: 1px solid #2980b9;
            transform: translateY(2px);
            margin-bottom: 2px;
        }

        .btn-subtext {
            font-size: 0.8em; color: #dbeeff; float: right; opacity: 0.9; margin-left: 5px;
            background: rgba(0,0,0,0.2); padding: 2px 4px; border-radius: 4px;
        }

        @media (max-height: 700px) {
            button.choice-btn { padding: 10px 8px; font-size: 0.85rem; }
            .header-left h1 { font-size: 0.9rem; }
            .screen { padding: 10px; }
            .news-ticker-container { font-size: 0.75rem; }
        }
        
        @media (max-height: 600px) {
            button.choice-btn { padding: 8px 6px; }
            .stat-value { font-size: 1rem; }
        }

        /* --- SNS画面 / エンディング --- */
        .overlay, .ending-modal {
            display: none;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            justify-content: center; align-items: center;
            backdrop-filter: blur(2px);
            padding: 15px;
        }
        .ending-modal { z-index: 200; position: fixed; }

        .sns-window {
            background-color: #fff; color: #333;
            width: 100%; height: 100%;
            max-height: 500px;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #3498db;
            display: flex; flex-direction: column;
        }
        .sns-header {
            background-color: #3498db; color: white; padding: 10px;
            text-align: center; font-weight: bold; flex-shrink: 0;
        }
        .sns-feed {
            padding: 10px; background-color: #f0f2f5; overflow-y: auto; flex: 1;
        }
        .tweet {
            background: white; padding: 10px; margin-bottom: 10px;
            border-radius: 8px; border: 1px solid #ddd; display: flex; gap: 10px;
        }
        .avatar {
            width: 40px; height: 40px; min-width: 40px;
            background-color: #ecf0f1; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 20px;
        }
        .tweet-content { flex: 1; }
        .user-name { font-weight: bold; font-size: 0.9em; margin-bottom: 2px; }
        .tweet-text { font-size: 0.9em; line-height: 1.4; }
        .likes { color: #e74c3c; font-size: 0.8em; margin-top: 5px; text-align: right; font-weight: bold; }
        .sns-close-btn {
            width: 100%; background-color: #2ecc71; color: white; border: none;
            border-bottom: 5px solid #27ae60; padding: 15px;
            font-family: 'DotGothic16', sans-serif; font-size: 1.1em;
            cursor: pointer; flex-shrink: 0;
        }
        .ending-content {
            background: #fff; color: #333; padding: 30px 20px;
            border: 6px solid #f1c40f; width: 100%; max-width: 500px;
            box-shadow: 0 0 30px #f1c40f; border-radius: 8px; text-align: center;
        }
        .ending-title { font-size: 2em; margin-bottom: 15px; color: #d35400; font-weight: bold; }
        .restart-btn {
            margin-top:20px; padding:15px 30px; background:#e74c3c;
            color:white; border:none; font-size:1.1em; cursor:pointer;
            width: 100%; border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="start-overlay" id="start-overlay">
        <h1 style="font-size: 2em; margin-bottom: 10px;">市長シミュレーター</h1>
        <p style="opacity: 0.8; font-size: 0.9em;">サウンドあり</p>
        <button class="start-btn" onclick="startGameWithAudio()">TAP TO START</button>
    </div>

    <div class="news-ticker-container">
        <div class="news-ticker-content" id="news-ticker">BREAKING NEWS: 新市長が就任、今後の都市計画に注目が集まっています...</div>
    </div>

    <header>
        <div class="header-left">
            <img src="images/character.png" alt="市長" class="mayor-icon" onerror="this.style.display='none'">
            <h1>市長シミュレーター</h1>
        </div>
        <div class="turn-badge" id="turn-display">YEAR 1 / 20</div>
    </header>

    <button class="bgm-btn" id="bgm-btn" onclick="toggleBGM()">🔊</button>

    <div class="status-bar">
        <div class="stat-box">
            <div class="stat-label">ECONOMY</div>
            <div class="stat-label">💰 経済</div>
            <div id="stat-eco" class="stat-value">10</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">NATURE</div>
            <div class="stat-label">🌿 自然</div>
            <div id="stat-nature" class="stat-value">10</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">CULTURE</div>
            <div class="stat-label">🎨 文化</div>
            <div id="stat-culture" class="stat-value">10</div>
        </div>
    </div>

    <div class="screen-container">
        <div class="screen" id="log-screen"></div>
    </div>

    <div class="controls" id="controls"></div>

    <div class="overlay" id="sns-overlay">
        <div class="sns-window">
            <div class="sns-header">📱 市民のトレンド</div>
            <div class="sns-feed" id="sns-feed"></div>
            <button class="sns-close-btn" onclick="closeSnsAndProceed()">決定して次の年へ ▶</button>
        </div>
    </div>
</div>

<div class="ending-modal" id="ending-modal">
    <div class="ending-content">
        <div class="ending-rank">FINAL RESULT</div>
        <h2 class="ending-title" id="ending-title">???</h2>
        <p id="ending-desc">...</p>
        <div style="margin-top:20px; font-size:0.9em; color:#666;" id="ending-stats-summary"></div>
        <button class="restart-btn" onclick="initGame()">RESTART</button>
    </div>
</div>

<script>
    /* * --- Audio System --- */
    const bgm = new Audio('Neon Reverie.mp3'); 
    bgm.loop = true;
    bgm.volume = 0.4;
    let isMuted = false;

    function startGameWithAudio() {
        const overlay = document.getElementById('start-overlay');
        bgm.play().then(() => {
            console.log("BGM再生成功");
        }).catch(error => {
            console.log("BGM再生エラー:", error);
        });

        overlay.style.transition = 'opacity 0.5s';
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 500);

        initGame();
    }

    function toggleBGM() {
        const btn = document.getElementById('bgm-btn');
        if (isMuted) {
            bgm.volume = 0.4;
            btn.innerText = "🔊";
            isMuted = false;
        } else {
            bgm.volume = 0;
            btn.innerText = "🔇";
            isMuted = true;
        }
    }

    /* * --- Typewriter Logic --- */
    let typeQueue = [];
    let isTyping = false;
    let currentCursor = null;

    function typeText(element, text, speed = 20) {
        return new Promise(resolve => {
            let i = 0;
            element.innerHTML = "";
            currentCursor = document.createElement("span");
            currentCursor.className = "cursor";
            element.appendChild(currentCursor);

            function type() {
                if (i < text.length) {
                    const charSpan = document.createElement("span");
                    charSpan.innerText = text.charAt(i);
                    element.insertBefore(charSpan, currentCursor);
                    i++;
                    scrollToBottom();
                    setTimeout(type, speed);
                } else {
                    resolve();
                }
            }
            type();
        });
    }

    function log(msg) {
        typeQueue.push(msg);
        processQueue();
    }

    async function processQueue() {
        if (isTyping || typeQueue.length === 0) return;
        isTyping = true;

        const msg = typeQueue.shift();
        const screen = document.getElementById('log-screen');
        const oldCursors = screen.querySelectorAll('.cursor');
        oldCursors.forEach(c => c.remove());

        const p = document.createElement('p');
        screen.appendChild(p);

        await typeText(p, msg);

        isTyping = false;
        if (typeQueue.length > 0) {
            processQueue();
        }
    }

    /* * --- Game Logic (20 Years / 20 Events) --- */

    let gameState = {
        turn: 1,
        maxTurns: 20,
        stats: { eco: 10, nature: 10, culture: 10 }
    };

    let pendingChoice = null;

    const events = [
        {

                { label: "緑地公園と市民広場", tags: "自然↑ 経済↓", effect: { eco: -2, nature: 5, culture: 2 }, log: "緑豊かな公園が市民のオアシスとなった。", voices: [{ name: "子育てママ", text: "子供を遊ばせる場所が欲しかったの！🌸", icon: "👩" }, { name: "社畜", text: "昼休みに芝生で寝れる。最高。", icon: "👔" }, { name: "不動産王", text: "一等地を公園にするとは、正気か？", icon: "💰" }] },
                { label: "現代美術館と劇場", tags: "文化↑ 経済↓", effect: { eco: -1, nature: -1, culture: 6 }, log: "前衛的な美術館がオープンし話題に。", voices: [{ name: "美大生", text: "やっとこの街にも文化の風が吹いた🎨", icon: "🎨" }, { name: "観光客", text: "映えスポット発見！#CityArt", icon: "📸" }, { name: "納税者", text: "そんな箱物より道路直してくれよ💢", icon: "🚗" }] }
            ]

        {
            id: 2,
            text: "シリコンバレーからIT企業の誘致打診。",
            news: "世界的IT企業、当市への進出を検討中",
            choices: [
                { label: "税制優遇で全面誘致", tags: "経済↑↑ 文化↓", effect: { eco: 8, nature: -2, culture: -3 }, log: "ガラス張りのビル群が空を覆った。", voices: [{ name: "Tech_Bro", text: "ここを第二のシリコンバレーにするぜ🚀", icon: "💻" }, { name: "古参住民", text: "横文字ばかりで、もはや別の街だ...", icon: "👵" }, { name: "投資家Z", text: "株価爆上がりｗ 買い占め正解。", icon: "📈" }] },

        {

        },
        {

            text: "築100年の赤レンガ倉庫、取り壊しか保存か。",

        const screen = document.getElementById('log-screen');
        screen.innerHTML = '';
        typeQueue = [];
        
        log('システム起動...');
        log('市長シミュレーター v2.0 (Long Run)');
        log('20年間の市政運営を開始します。');

        updateUI();
        loadEvent();
    }

    function updateUI() {
        document.getElementById('turn-display').innerText = `YEAR ${gameState.turn} / ${gameState.maxTurns}`;
        
        document.getElementById('stat-eco').innerText = gameState.stats.eco;
        document.getElementById('stat-nature').innerText = gameState.stats.nature;
        document.getElementById('stat-culture').innerText = gameState.stats.culture;
    }

    function loadEvent() {
        const controlsDiv = document.getElementById('controls');
        controlsDiv.innerHTML = '';

        const eventIndex = (gameState.turn - 1) % events.length;
        const currentEvent = events[eventIndex];

        updateTicker(currentEvent.news);
        setTimeout(() => {
            log(`\n[ 第${gameState.turn}年 ] ${currentEvent.text}`);
        }, 500);

        currentEvent.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `${choice.label} <span class="btn-subtext">${choice.tags}</span>`;
            btn.onclick = () => openSns(choice);
            controlsDiv.appendChild(btn);
        });
    }

    function updateTicker(text) {
        const ticker = document.getElementById('news-ticker');
        ticker.innerText = `BREAKING NEWS: ${text}  ///  現在の市況: 経済${gameState.stats.eco} 自然${gameState.stats.nature} 文化${gameState.stats.culture}  ///  `;
    }

    function openSns(choice) {
        pendingChoice = choice;
        const overlay = document.getElementById('sns-overlay');
        const feed = document.getElementById('sns-feed');
        feed.innerHTML = '';

        choice.voices.forEach(voice => {
            const tweet = document.createElement('div');
            tweet.className = 'tweet';
            const likes = Math.floor(Math.random() * 800) + 12;
            
            tweet.innerHTML = `
                <div class="avatar">${voice.icon}</div>
                <div class="tweet-content">
                    <div class="user-name">${voice.name}</div>
                    <div class="tweet-text">${voice.text}</div>
                    <div class="likes">❤️ ${likes} Likes</div>
                </div>
            `;
            feed.appendChild(tweet);
        });

        overlay.style.display = 'flex';
    }

    function closeSnsAndProceed() {
        document.getElementById('sns-overlay').style.display = 'none';
        if(pendingChoice) {
            executeChoice(pendingChoice);
        }
    }

    function executeChoice(choice) {
        gameState.stats.eco += choice.effect.eco;
        gameState.stats.nature += choice.effect.nature;
        gameState.stats.culture += choice.effect.culture;

        log(`> 決定: ${choice.label}`);
        log(`> ${choice.log}`);

        gameState.turn++;

        if (gameState.turn > gameState.maxTurns) {
            updateUI();
            showEnding();
        } else {
            updateUI();
            loadEvent();
            scrollToBottom();
        }
    }

    function scrollToBottom() {
        const screen = document.getElementById('log-screen');
        screen.scrollTop = screen.scrollHeight;
    }

    function showEnding() {
        const modal = document.getElementById('ending-modal');
        const title = document.getElementById('ending-title');
        const desc = document.getElementById('ending-desc');
        const summary = document.getElementById('ending-stats-summary');

        const { eco, nature, culture } = gameState.stats;
        let resultTitle = "", resultDesc = "";

        // 20年版の評価基準（数値が高くなりやすいので閾値を調整）
        const HIGH = 40;
        const LOW = 10;

        if (eco > HIGH && nature < LOW) {
            resultTitle = "🌃 ネオ・サイバーシティ";
            resultDesc = "空を覆う摩天楼、飛び交うドローン。経済は頂点に達したが、緑は失われた不夜城。";
        } else if (nature > HIGH && eco < 15) {
            resultTitle = "🌲 聖なる森の都市";
            resultDesc = "文明と森が完全に融合した姿。経済規模は小さいが、地上で最も美しい楽園。";
        } else if (culture > HIGH) {
            resultTitle = "🎭 千年の都";
            resultDesc = "世界中から人々が訪れる、芸術と歴史の聖地。その魅力は永遠に語り継がれる。";
        } else if (eco > 30 && nature > 30 && culture > 30) {
            resultTitle = "💎 奇跡のユートピア";
            resultDesc = "全てのバランスが黄金比で保たれた伝説の都市。教科書に載るレベルの偉業です。";
        } else if (eco < LOW && nature < LOW && culture < LOW) {
            resultTitle = "👻 限界集落・ゴーストタウン";
            resultDesc = "街は破綻し、誰もいなくなった...。市長、どこで間違えたのでしょうか。";
        } else if (eco >= nature && eco >= culture) {
            resultTitle = "🏢 メガロポリス";
            resultDesc = "標準的な発展を遂げた大都市。便利だが、どこか無機質な空気が漂う。";
        } else if (nature >= eco && nature >= culture) {
            resultTitle = "🏡 田園都市";
            resultDesc = "自然豊かなベッドタウン。派手さはないが、住環境は抜群に良い。";
        } else {
            resultTitle = "🎨 地方文化都市";
            resultDesc = "独自の文化が根付いた、味のある街。コアなファンが多い。";
        }

        title.innerText = resultTitle;
        desc.innerText = resultDesc;
        summary.innerText = `最終スコア: 経済${eco} / 自然${nature} / 文化${culture}`;
        
        modal.style.display = 'flex';
    }
</script>

</body>
</html>
