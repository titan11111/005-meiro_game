<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>栗拾いミッション</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">📡 本部からの通信</div>
            <div class="modal-body" id="modalText"></div>
            <button id="modalBtn" class="modal-btn">了解</button>
        </div>
    </div>

    <div class="game-container">
        <header class="game-header">
            <div class="header-top">
                <h1>MISSION: 栗回収</h1>
                <div class="level-badge">STAGE <span id="levelCount">1</span>/10</div>
            </div>
            <div class="score-board">
                <div class="score-box player">
                    <span class="icon">🧑</span> <span id="playerScore">0</span>
                </div>
                <div class="vs">VS</div>
                <div class="score-box enemy">
                    <span class="icon">👾</span> <span id="enemyScore">0</span>
                </div>
            </div>
        </header>
        
        <main class="game-main">
            <div class="field-container">
                <div class="game-field" id="gameField"></div>
            </div>
            
            <div class="game-controls">
                <button id="gunBtn" class="gun-btn hidden">🔫 麻酔銃を使用！</button>

                <div class="d-pad">
                    <button class="d-btn up" id="upBtn">▲</button>
                    <button class="d-btn left" id="leftBtn">◀</button>
                    <button class="d-btn right" id="rightBtn">▶</button>
                    <button class="d-btn down" id="downBtn">▼</button>
                    <div class="d-center"></div>
                </div>
                <button class="restart-btn" id="restartBtn">最初から</button>
            </div>
        </main>
        
        <footer class="game-footer">
            <p>👾より多くの🌰を集めて脱出せよ！</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
