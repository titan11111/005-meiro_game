<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New York Heartbeat</title>
<style>
body {
  background: linear-gradient(180deg, #ffffff, #eef4ff);
  font-family: 'Trebuchet MS', sans-serif;
  margin: 0;
  overflow: hidden;
  height: 100vh;
}
#game {
  position: relative;
  width: 100%;
  height: 100%;
}
.character {
  position: absolute;
  bottom: 0;
  transition: opacity 0.6s ease-in;
}
#male {
  left: 0;
  height: 56%;
}
#female {
  right: 10%;
  height: 70%;
}
#dialogue-box {
  position: absolute;
  top: 16%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 25px 35px;
  font-size: 1.5em;
  text-align: center;
  line-height: 1.6;
  box-shadow: 0 4px 25px rgba(0,0,0,0.15);
  display: none;
}
#male-dialogue {
  position: absolute;
  bottom: 35%;
  left: 23%;
  background: rgba(255,255,255,0.9);
  border-radius: 16px;
  padding: 12px 18px;
  font-size: 1.2em;
  text-align: left;
  display: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
#choices {
  position: absolute;
  bottom: 8%;
  left: 23%;
  display: none;
}
.choice {
  background: rgba(255,255,255,0.95);
  border: 2px solid #333;
  border-radius: 10px;
  margin: 8px;
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 1.1em;
}
.choice:hover {
  background: #e3f1ff;
  transform: scale(1.05);
}
#hearts {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 1.6em;
}
#popup {
  display: none;
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.95);
  padding: 20px 40px;
  border-radius: 12px;
  text-align: center;
  font-size: 1.4em;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
#start-screen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
}
#start-btn {
  background: #fff;
  color: #333;
  border: none;
  border-radius: 10px;
  padding: 15px 40px;
  font-size: 1.4em;
  cursor: pointer;
  transition: 0.2s;
}
#start-btn:hover {
  background: #e7f1ff;
}
</style>
</head>
<body>
<div id="start-screen">
  <h1>💬 New York Heartbeat 💬</h1>
  <p>Talk with New York girls and win their heart!</p>
  <button id="start-btn">Start Game</button>
</div>

<div id="game" style="display:none;">
  <img id="male" class="character" src="images/male_back.png">
  <img id="female" class="character" src="">
  <div id="dialogue-box"></div>
  <div id="male-dialogue"></div>
  <div id="choices"></div>
  <div id="hearts">❤️❤️❤️❤️❤️</div>
  <div id="popup"></div>

const choices = document.getElementById("choices");

const popup = document.getElementById("popup");
let voices = [];
let hearts = 5;
let currentPersona = null;

],

// ❤️更新
function updateHearts(){ heartDisplay.textContent = "❤️".repeat(Math.max(0, hearts)); }

// 🔊ボイス準備
function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith("en") && v.name.match(/Female|Samantha|Victoria|Karen|Moira|Zira/i));
}

// 🔊発話（キャラごとに声の個性）
function speak(text, persona){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";

  const voice = voices.length ? voices[Math.floor(Math.random()*voices.length)] : null;
  utter.voice = voice;

  const settings = {
    Ava: { pitch: 1.2, rate: 1.0 },
    Chloe: { pitch: 1.4, rate: 1.1 },
    Emily: { pitch: 1.0, rate: 0.95 },
    Lily: { pitch: 1.3, rate: 1.05 },
    Madison: { pitch: 1.1, rate: 1.0 },
    Mia: { pitch: 1.35, rate: 1.1 },
    Olivia: { pitch: 1.0, rate: 0.9 },
    Rachel: { pitch: 1.15, rate: 1.0 },
    Sarah: { pitch: 1.05, rate: 0.95 },
    Zoe: { pitch: 1.25, rate: 1.05 }
  };

  const s = settings[persona] || { pitch: 1.1, rate: 1.0 };
  utter.pitch = s.pitch;
  utter.rate = s.rate;

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

// 💬会話表示
function showConversation(){
  currentPersona = femaleImgs[Math.floor(Math.random()*femaleImgs.length)];
  femaleEl.src = `images/${currentPersona}.png`;

  const convSet = dialogueData[currentPersona];
  const conv = convSet[Math.floor(Math.random()*convSet.length)];

  dialogue.textContent = conv.text;
  dialogue.style.display = "block";
  speak(conv.text, currentPersona);

  choices.innerHTML = "";
  conv.options.forEach(opt=>{
    const btn=document.createElement("div");
    btn.className="choice";
    btn.textContent=opt.text;
    btn.onclick=    btn.onclick=()=>{
      maleSpeech.textContent=opt.text;
      maleSpeech.style.display="block";
      choices.style.display="none";

      if(opt.result==="good"){
        hearts++;
        showPopup("❤️ She smiles!");
      }
      else if(opt.result==="neutral"){
        showPopup("😐 She nods.");
      }
      else if(opt.result==="bad"){
        hearts--;
        showPopup("💢 She frowns.");
      }
      else{
        hearts -= 2;
        showPopup("💔 She walks away.");
      }

      updateHearts();
    };
    choices.appendChild(btn);
  });
  choices.style.display="block";
}

// 🎁ポップアップ表示
function showPopup(text){
  popup.textContent = text;
  popup.style.display = "block";
  setTimeout(()=>{
    popup.style.display = "none";
    if(hearts <= 0) gameOver();
    else if(hearts >= 10) gameClear();
    else showConversation();
  },1600);
}

// 💔ゲームオーバー
function gameOver(){
  dialogue.textContent = "She lost interest... 💔";
  popup.textContent = "💔 Game Over 💔";
  popup.style.display = "block";
  hearts = 0;
  updateHearts();
  setTimeout(()=>{ location.reload(); }, 2500);
}

// 💖ゲームクリア
function gameClear(){
  dialogue.textContent = "She’s impressed by you. 💖";
  popup.textContent = "💖 You won her heart! 💖";
  popup.style.display = "block";
  setTimeout(()=>{ location.reload(); }, 2500);
}

// ▶️ゲーム開始
document.getElementById("start-btn").onclick = ()=>{
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  loadVoices();
  showConversation();
};

window.speechSynthesis.onvoiceschanged = loadVoices;
</script>
</body>
</html>
