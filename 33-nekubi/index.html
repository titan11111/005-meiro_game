<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>忍びの道 - Shadow Assassin: Hyper Slash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap');

        body {
            margin: 0;
            background-color: #050510;
            color: #ddd;
            font-family: 'Sawarabi Mincho', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
            -webkit-touch-callout: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #000;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        #title {
            font-family: 'Yuji Syuku', serif;
            font-size: clamp(40px, 8vw, 80px);
            color: #c00;
            text-shadow: 2px 2px 0 #fff;
            margin-bottom: 10px;
        }
        
        #mission {
            font-family: 'Sawarabi Mincho', serif;
            font-size: clamp(16px, 4vw, 24px);
            color: #ddd;
            margin-bottom: 40px;
            letter-spacing: 2px;
            border-top: 1px solid #555;
            border-bottom: 1px solid #555;
            padding: 10px 20px;
        }

        button {
            padding: 15px 60px;
            font-size: clamp(20px, 5vw, 32px);
            background: linear-gradient(to bottom, #a00, #600);
            color: white;
            border: 2px solid #f55;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Yuji Syuku', serif;
            box-shadow: 0 4px 0 #400; /* 立体感 */
            transition: all 0.1s;
            pointer-events: auto;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #400; background: #f00; }

        /* --- コントローラー修正箇所 --- */
        #touch-controls {
            position: fixed; 
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto; 
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 10px 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); /* iPhone下のバー対策 */
            box-sizing: border-box;
            z-index: 50;
        }

        .ctrl-group { 
            pointer-events: auto; 
            position: relative;
        }

        /* 共通ボタンスタイル（立体感と押しやすさ重視） */
        .t-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.5); /* 影で立体感 */
            transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
            font-family: 'Yuji Syuku', serif;
            font-weight: bold;
            touch-action: none;
        }

        /* 押した時のアニメーション（沈み込む） */
        .t-btn:active, .t-btn.active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0);
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
        }

        /* --- 左側：移動キー (Horizontal Layout) --- */
        #movement {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 10px;
        }

        .move-btn {
            width: 65px; height: 65px; /* 大きく */
            font-size: 32px;
        }
        
        /* しゃがみボタンは少し小さく、邪魔にならないように */
        #btn-down {
            width: 50px; height: 50px;
            font-size: 24px;
            margin-bottom: 5px; /* 位置調整 */
            background: rgba(100, 100, 100, 0.2);
        }

        /* --- 右側：アクションキー (Diamond Layout) --- */
        #actions {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 5px;
            margin-right: 10px;
            margin-bottom: 10px;
            align-items: center;
            justify-items: center;
        }

        .act-btn {
            width: 60px; height: 60px;
            font-size: 22px;
        }

        /* 配置グリッド定義 */
        /* [投] 
          [斬]  [隠]
             [飛]
        */
        #btn-shu  { grid-column: 2; grid-row: 1; margin-top: 10px;} /* 上：手裏剣 */
        #btn-atk  { grid-column: 1; grid-row: 2; margin-right: -10px;} /* 左：斬撃 */
        #btn-hide { grid-column: 3; grid-row: 2; margin-left: -10px;} /* 右：隠れる */
        
        /* ジャンプボタン（最重要） */
        #btn-jump { 
            grid-column: 2; grid-row: 2; 
            width: 70px; height: 70px; /* 一番大きく */
            font-size: 28px;
            background: rgba(50, 150, 255, 0.25);
            border-color: #8af;
            z-index: 10;
            transform: translateY(20px); /* 少し下にずらす */
        }
        #btn-jump:active, #btn-jump.active { background: rgba(50, 150, 255, 0.5); transform: translateY(24px); }

        #btn-atk { background: rgba(255, 50, 50, 0.25); border-color: #f88; }
        #btn-shu { background: rgba(50, 50, 255, 0.25); border-color: #88f; width: 50px; height: 50px; }
        #btn-hide { background: rgba(50, 200, 50, 0.25); border-color: #8f8; width: 50px; height: 50px; }

        .pc-hint { display: none; margin-top: 5px; color: #666; font-size: 12px; }
        @media (min-width: 1024px) {
            .pc-hint { display: block; }
            #touch-controls { display: none; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="overlay">
        <div id="title">影の城</div>
        <div id="mission">【指令】 最上階ノ敵将ヲ暗殺セヨ</div>
        <button id="startBtn">潜入開始</button>
    </div>
</div>

<div id="touch-controls">
    <div id="movement" class="ctrl-group">
        <div id="btn-left" class="t-btn move-btn">←</div>
        <div id="btn-down" class="t-btn">↓</div>
        <div id="btn-right" class="t-btn move-btn">→</div>
    </div>

    <div id="actions" class="ctrl-group">
        <div id="btn-shu" class="t-btn act-btn">投</div>
        <div id="btn-atk" class="t-btn act-btn">斬</div>
        <div id="btn-jump" class="t-btn act-btn">飛</div> <div id="btn-hide" class="t-btn act-btn">隠</div>
    </div>
</div>

<div class="pc-hint">
    PC操作: 矢印キー移動 | Z:斬撃 | X:手裏剣 | C:隠れる(長押し) | ↑:ジャンプ
</div>

<script>
/**
 * iOS用ズーム防止スクリプト
 */
document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });

// --- Audio System (変更なし) ---
const ASSETS = { bgm_stealth: 'kokoro.mp3', bgm_action: 'nekugi.mp3' };

class AudioSystem {
    constructor() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
        this.bgm = {};
        const loadAudio = (url) => { const audio = new Audio(url); audio.onerror = () => console.warn(`Audio missing: ${url}`); return audio; };
        this.bgm.stealth = loadAudio(ASSETS.bgm_stealth); this.bgm.stealth.loop = true;
        this.bgm.action = loadAudio(ASSETS.bgm_action); this.bgm.action.loop = true;
        this.currentBgm = null; this.activeSources = {};
    }
    resume() { if (this.ctx.state === 'suspended') this.ctx.resume().catch(e=>{}); }
    playBgm(type) {
        this.resume();
        if (this.currentBgm === this.bgm[type] && !this.currentBgm.paused) return;
        if (this.currentBgm) { this.currentBgm.pause(); this.currentBgm.currentTime = 0; }
        this.currentBgm = this.bgm[type];
        if(this.currentBgm) { this.currentBgm.volume = 0.5; this.currentBgm.play().catch(e => {}); }
    }
    stopBgm() { if (this.currentBgm) { this.currentBgm.pause(); this.currentBgm.currentTime = 0; this.currentBgm = null; } }
    playSfx(type) {
        if(this.ctx.state === 'suspended') this.ctx.resume();
        const t = this.ctx.currentTime;
        if (this.activeSources[type]) { try { this.activeSources[type].stop(); } catch(e){} }
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination); this.activeSources[type] = osc;
        try {
            osc.start(t);
            let d = 0.1; 
            switch (type) {
                case 'jump': d=0.2; osc.type='triangle'; osc.frequency.setValueAtTime(150,t); osc.frequency.exponentialRampToValueAtTime(400,t+d); gain.gain.setValueAtTime(0.1,t); gain.gain.linearRampToValueAtTime(0.001,t+d); break;
                case 'slash': d=0.2; osc.type='sawtooth'; osc.frequency.setValueAtTime(800,t); osc.frequency.exponentialRampToValueAtTime(50,t+d); gain.gain.setValueAtTime(0.15,t); gain.gain.exponentialRampToValueAtTime(0.001,t+d); break;
                case 'heavy': d=0.3; osc.type='square'; osc.frequency.setValueAtTime(80,t); gain.gain.setValueAtTime(0.3,t); gain.gain.linearRampToValueAtTime(0.001,t+d); break;
                case 'vanish': d=0.1; osc.type='square'; osc.frequency.setValueAtTime(300,t); gain.gain.setValueAtTime(0.05,t); gain.gain.linearRampToValueAtTime(0.001,t+d); break;
                case 'throw': d=0.1; osc.type='triangle'; osc.frequency.setValueAtTime(1200,t); gain.gain.setValueAtTime(0.05,t); gain.gain.exponentialRampToValueAtTime(0.001,t+d); break;
                case 'alert': d=0.4; osc.type='sawtooth'; osc.frequency.setValueAtTime(400,t); gain.gain.setValueAtTime(0.1,t); gain.gain.linearRampToValueAtTime(0.001,t+d); break;
                case 'hit': d=0.2; osc.type='sawtooth'; osc.frequency.setValueAtTime(150,t); osc.frequency.linearRampToValueAtTime(50, t+d); gain.gain.setValueAtTime(0.3,t); gain.gain.linearRampToValueAtTime(0.001,t+d); break;
                case 'critical': d=1.0; osc.type='sawtooth'; osc.frequency.setValueAtTime(100,t); osc.frequency.exponentialRampToValueAtTime(10,t+0.5); gain.gain.setValueAtTime(0.8,t); gain.gain.exponentialRampToValueAtTime(0.001,t+d); break;
                case 'hide': d=0.3; osc.type='sine'; osc.frequency.setValueAtTime(400,t); osc.frequency.linearRampToValueAtTime(800,t+d); gain.gain.setValueAtTime(0.2,t); gain.gain.linearRampToValueAtTime(0.001,t+d); break;
            }
            osc.stop(t + d); osc.onended = () => { try { osc.disconnect(); gain.disconnect(); } catch(e){} };
        } catch(e) { console.error(e); }
    }
}

// --- Global Variables ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const audio = new AudioSystem();
const GRAVITY = 0.6;
const STAGE_MAX = 5;

let ninja, platforms = [], enemies = [], projectiles = [], particles = [], tonosama = null;
let currentStage = 1, gameState = 'start', animFrameCount = 0;
let loopId = null; 
let executionTimer = 0;
const EXECUTION_DURATION = 180; 

const KEYS = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false, z: false, x: false, c: false };

window.addEventListener('keydown', e => { 
    if(KEYS.hasOwnProperty(e.key) || e.key === 'Shift') {
        if (e.key === 'Shift') KEYS.c = true; else KEYS[e.key] = true; 
    }
});
window.addEventListener('keyup', e => { 
    if(KEYS.hasOwnProperty(e.key) || e.key === 'Shift') {
        if (e.key === 'Shift') KEYS.c = false; else KEYS[e.key] = false; 
    }
});

// --- タッチバインドの更新 ---
const bindTouch = (id, key) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); KEYS[key] = true; el.classList.add('active'); }, {passive: false});
    el.addEventListener('touchend', (e) => { e.preventDefault(); KEYS[key] = false; el.classList.remove('active'); }, {passive: false});
};

// 新しいボタンIDへのマッピング
bindTouch('btn-left', 'ArrowLeft'); 
bindTouch('btn-right', 'ArrowRight'); 
bindTouch('btn-down', 'ArrowDown'); // しゃがみ用
bindTouch('btn-jump', 'ArrowUp');   // 「飛」ボタンをArrowUp(ジャンプ)に割り当て
bindTouch('btn-atk', 'z'); 
bindTouch('btn-shu', 'x'); 
bindTouch('btn-hide', 'c');

// --- Classes ---

class Ninja {
    constructor(x, y) {
        this.x = x; this.y = y; this.w = 30; this.h = 30;
        this.vx = 0; this.vy = 0;
        this.hp = 3; this.shurikens = 5;
        this.speed = 5; this.jumpPower = -13.5;
        this.grounded = false; this.facing = 1;
        this.state = 'idle'; this.attackTimer = 0;
        this.trail = []; this.coyoteTime = 0; this.rotation = 0;
        this.isHidden = false;
    }

    update(platforms) {
        if (gameState === 'execution') return;

        if (KEYS.c && this.grounded) {
            if (!this.isHidden) {
                audio.playSfx('hide');
                for(let i=0; i<10; i++) particles.push(new Particle(this.x+15, this.y+15, '#ccc', 2));
            }
            this.isHidden = true; this.state = 'hide'; this.vx = 0;
        } else {
            this.isHidden = false;
        }

        if (!this.isHidden && (Math.abs(this.vx) > 0 || Math.abs(this.vy) > 0)) {
            this.trail.push({x: this.x, y: this.y, alpha: 0.6, rot: this.rotation});
            if(this.trail.length > 4) this.trail.shift();
        } else { this.trail = []; }

        if (!this.isHidden) {
            if (KEYS.ArrowRight) { this.vx = this.speed; this.facing = 1; }
            else if (KEYS.ArrowLeft) { this.vx = -this.speed; this.facing = -1; }
            else { this.vx = 0; }

            if (KEYS.ArrowDown && this.grounded) {
                this.h = 20; this.y += 10; this.vx = 0; this.state = 'crouch';
            } else {
                if(this.h === 20) this.y -= 10; this.h = 30; this.state = 'idle';
            }

            if (this.grounded) {
                this.coyoteTime = 5; this.rotation = 0;
            } else {
                if (this.coyoteTime > 0) this.coyoteTime--;
                this.rotation += 0.3 * this.facing;
            }

            if (KEYS.ArrowUp && this.coyoteTime > 0) {
                this.vy = this.jumpPower; this.grounded = false; this.coyoteTime = 0; this.y -= 2;
                audio.playSfx('jump');
            }
        }

        this.vy += GRAVITY; this.x += this.vx; this.y += this.vy;

        this.grounded = false;
        platforms.forEach(p => {
            if(p.type === 'vanish' && !p.active) return;
            if (this.x < p.x + p.w && this.x + this.w > p.x &&
                this.y < p.y + p.h && this.y + this.h > p.y) {
                if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 16) {
                    this.y = p.y - this.h; this.vy = 0; this.grounded = true;
                    if (p.type === 'moving') this.x += p.vx;
                }
            }
        });

        if (!this.isHidden) {
            if (this.attackTimer > 0) this.attackTimer--;
            if (KEYS.z && this.attackTimer <= 0) {
                this.attackTimer = 20; this.state = 'attack'; audio.playSfx('slash');
                let hx = this.facing === 1 ? this.x + this.w : this.x - 50;
                enemies.forEach(e => {
                    if(!e.dead && hx < e.x + e.w && hx + 50 > e.x && this.y < e.y + e.h && this.y + this.h > e.y) e.takeDamage(10);
                });
            }
            if (KEYS.x && this.attackTimer <= 0 && this.shurikens > 0) {
                this.shurikens--; this.attackTimer = 30; audio.playSfx('throw');
                projectiles.push(new Projectile(this.x + 15, this.y + 10, this.facing * 12, 0));
            }
        }

        if(this.x < 0) this.x = 0; if(this.x > 800 - this.w) this.x = 800 - this.w;
        if(this.y > 600) this.hp = 0;
    }

    draw() {
        ctx.globalAlpha = this.isHidden ? 0.3 : 1.0;

        this.trail.forEach(t => {
            ctx.save(); ctx.translate(t.x + this.w/2, t.y + this.h/2); ctx.rotate(t.rot);
            ctx.fillStyle = `rgba(80, 80, 80, ${t.alpha})`; ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.restore(); t.alpha -= 0.1;
        });

        ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2); ctx.rotate(this.rotation);
        ctx.fillStyle = '#111'; ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        ctx.fillStyle = '#d00'; ctx.beginPath();
        ctx.moveTo((this.facing===1?-5:5), -5); ctx.lineTo((this.facing===1?-30:30), -10); ctx.lineTo((this.facing===1?-35:35), 0); ctx.lineTo((this.facing===1?-5:5), 5); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillRect((this.facing===1?7:-13), -7, 6, 2);
        ctx.restore();

        if (this.isHidden) { ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif'; ctx.fillText('隠', this.x + 10, this.y - 10); }

        if(this.state === 'attack' && this.attackTimer > 10) {
            ctx.save(); ctx.translate(this.x + this.w/2, this.y + this.h/2); ctx.scale(this.facing, 1); 
            let grad = ctx.createLinearGradient(0, -50, 0, 50);
            grad.addColorStop(0, 'rgba(200, 240, 255, 0)'); grad.addColorStop(0.5, 'rgba(200, 255, 255, 0.9)'); grad.addColorStop(1, 'rgba(200, 240, 255, 0)');
            ctx.fillStyle = grad; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(40, -40, 60, -20, 60, 0); ctx.bezierCurveTo(60, 20, 40, 40, 0, 0); ctx.arc(0, 0, 50, -0.5, 0.5, false); ctx.lineTo(0,0); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.shadowBlur = 5; ctx.beginPath(); ctx.arc(0, 0, 50, -0.5, 0.5, false); ctx.stroke();
            ctx.restore();
        }
        ctx.globalAlpha = 1.0;
    }
}

class Enemy {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.w = 30; this.h = 40; this.type = type;
        this.vx = 0; this.vy = 0; this.facing = 1; this.patrolX = x;
        this.alert = false; this.dead = false;
        this.chaseTimer = 0; this.targetX = null; this.grounded = false; 

        if (type === 'ashigaru') { this.hp = 10; this.viewDist = 160; this.attackRange = 60; }
        if (type === 'samurai') { this.hp = 25; this.viewDist = 200; this.attackRange = 40; }
        if (type === 'musha') { this.hp = 50; this.w = 40; this.h = 50; this.viewDist = 140; this.attackRange = 50; }
        this.attackCooldown = 0; this.attackState = 0;
    }

    update() {
        if(this.dead || gameState === 'execution') return;
        this.vy += GRAVITY; this.y += this.vy;
        
        this.grounded = false;
        platforms.forEach(p => {
            if (this.x < p.x + p.w && this.x + this.w > p.x && this.y < p.y + p.h && this.y + this.h > p.y) {
                if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 15) { this.y = p.y - this.h; this.vy = 0; this.grounded = true; }
            }
        });

        let dx = ninja.x - this.x; let dy = ninja.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy); let canSee = false;
        let effectiveViewDist = this.viewDist;
        if (ninja.state === 'crouch') effectiveViewDist *= 0.6;

        if (!ninja.isHidden) {
            if ((this.facing === 1 && dx > 0) || (this.facing === -1 && dx < 0)) {
                if (dist < effectiveViewDist && Math.abs(dy) < 60) {
                    if (dist < 50 || ninja.state !== 'crouch') canSee = true;
                }
            }
        }

        if (this.attackCooldown > 0) this.attackCooldown--;
        if (this.attackState > 0) this.attackState--;

        if (canSee && ninja.hp > 0) {
            if (!this.alert) { this.alert = true; audio.playSfx('alert'); }
            this.chaseTimer = 180; this.targetX = ninja.x;
            if (dist < this.attackRange && this.attackCooldown <= 0) { this.performAttack(); } 
            else if (this.attackState <= 0) {
                this.vx = dx > 0 ? (this.type==='samurai'?2.2:1.2) : (this.type==='samurai'?-2.2:-1.2);
                this.facing = this.vx > 0 ? 1 : -1;
                if (this.grounded) {
                    if ((ninja.y < this.y - 40 && Math.abs(dx) < 100) || Math.random() < 0.02) { this.vy = -12; this.grounded = false; }
                }
            } else { this.vx = 0; }
        } else if (this.chaseTimer > 0) {
            this.chaseTimer--;
            let tdx = this.targetX - this.x;
            if (Math.abs(tdx) > 10) {
                this.vx = tdx > 0 ? 1.5 : -1.5; this.facing = this.vx > 0 ? 1 : -1;
                if (this.grounded && Math.random() < 0.01) { this.vy = -12; this.grounded = false; }
            } else { this.vx = 0; }
        } else {
            this.alert = false;
            if (this.attackState <= 0) {
                this.x += this.vx;
                if (Math.abs(this.x - this.patrolX) > 100) { this.vx = (this.x > this.patrolX) ? -1 : 1; this.facing = this.vx > 0 ? 1 : -1; }
            }
        }
        if (!canSee && this.chaseTimer <= 0 && this.attackState <= 0 && this.vx === 0) this.vx = this.facing;
        this.x += this.vx;
    }

    performAttack() {
        this.attackCooldown = 60; this.attackState = 30;
        if (this.type === 'ashigaru') audio.playSfx('spear');
        else if (this.type === 'samurai') audio.playSfx('slash');
        else if (this.type === 'musha') { this.attackState = 45; setTimeout(() => audio.playSfx('heavy'), 300); }
        
        setTimeout(() => {
            if (this.dead) return;
            let d = Math.sqrt(Math.pow(ninja.x - this.x, 2) + Math.pow(ninja.y - this.y, 2));
            if (d < this.attackRange + 15) {
                ninja.hp--; audio.playSfx('hit');
                for(let i=0; i<5; i++) particles.push(new Particle(ninja.x+15, ninja.y+15, '#d00', 3));
            }
        }, 300);
    }

    takeDamage(dmg) {
        this.hp -= dmg; audio.playSfx('hit');
        if(this.hp <= 0) {
            this.dead = true;
            if(Math.random() < 0.4) ninja.shurikens++;
            for(let i=0; i<8; i++) particles.push(new Particle(this.x+15, this.y+20, '#a00'));
        }
    }

    draw() {
        if(this.dead) return;
        ctx.fillStyle = (this.alert || this.chaseTimer > 0) ? 'rgba(255,50,50,0.2)' : 'rgba(255,255,100,0.1)';
        ctx.beginPath(); ctx.moveTo(this.x+this.w/2, this.y+10);
        let currentDist = (ninja.state === 'crouch' && !this.alert) ? this.viewDist * 0.6 : this.viewDist;
        if (ninja.isHidden) currentDist = 0; 
        ctx.lineTo(this.x+this.w/2 + this.facing*currentDist, this.y-40); ctx.lineTo(this.x+this.w/2 + this.facing*currentDist, this.y+80); ctx.fill();
        if(this.alert) { ctx.fillStyle='red'; ctx.font='bold 20px Arial'; ctx.fillText('!', this.x+10, this.y-10); } 
        else if (this.chaseTimer > 0) { ctx.fillStyle='orange'; ctx.font='bold 20px Arial'; ctx.fillText('?', this.x+10, this.y-10); }

        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = this.type==='samurai'?'#b33':(this.type==='musha'?'#333':'#44a');
        ctx.fillRect(this.x, this.y, this.w, this.h);

        if (this.attackState > 0) {
            ctx.fillStyle = '#fff';
            if (this.type === 'ashigaru') {
                let reach = (30 - Math.abs(this.attackState - 15)) * 2; ctx.fillRect(this.x + (this.facing===1?this.w: -reach), this.y+20, reach, 5);
            } else if (this.type === 'samurai') {
                ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x + this.w/2, this.y+20, 40, this.facing===1?-1:2, this.facing===1?1:4); ctx.stroke();
            } else if (this.type === 'musha') {
                if (this.attackState > 15) ctx.fillRect(this.x + (this.facing===1?-10:this.w), this.y-20, 10, 40);
                else { ctx.fillStyle = '#fa0'; ctx.beginPath(); ctx.arc(this.x + this.w/2 + this.facing*30, this.y+this.h, 20 + (15-this.attackState), 0, Math.PI*2); ctx.fill(); }
            }
        } else {
            if(this.type === 'ashigaru') {
                ctx.fillStyle = '#666'; ctx.beginPath(); ctx.moveTo(this.x-5, this.y); ctx.lineTo(this.x+15, this.y-10); ctx.lineTo(this.x+35, this.y); ctx.fill();
                ctx.fillStyle = '#852'; ctx.fillRect(this.x+(this.facing===1?20:-10), this.y+20, 5, 30);
            } else if (this.type === 'samurai') {
                ctx.fillStyle = '#222'; ctx.fillRect(this.x-2, this.y, this.w+4, 10); ctx.fillStyle = '#ccc'; ctx.fillRect(this.x+(this.facing===1?0:-10), this.y+25, 20, 4);
            } else if (this.type === 'musha') {
                ctx.fillStyle = '#d90'; ctx.beginPath(); ctx.moveTo(this.x+5, this.y); ctx.lineTo(this.x+20, this.y-15); ctx.lineTo(this.x+35, this.y); ctx.fill();
            }
        }
    }
}

class Projectile {
    constructor(x, y, vx, vy) { this.x=x; this.y=y; this.vx=vx; this.vy=vy; this.active=true; this.rot=0; }
    update() { this.x+=this.vx; this.y+=this.vy; this.rot+=0.4; if(this.x<0||this.x>800) this.active=false; }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot);
        ctx.fillStyle='#fff'; ctx.shadowBlur=8; ctx.shadowColor='#aff';
        ctx.beginPath(); for(let i=0;i<4;i++){ ctx.rotate(Math.PI/2); ctx.moveTo(0,0); ctx.lineTo(0,-8); ctx.lineTo(4,-4); }
        ctx.fill(); ctx.restore();
    }
}

class Particle {
    constructor(x, y, color, speed=4) {
        this.x = x; this.y = y; this.color = color;
        this.vx = (Math.random()-0.5)*speed; this.vy = (Math.random()-0.5)*speed;
        this.life = 30 + Math.random()*20;
    }
    update() { this.x+=this.vx; this.y+=this.vy; this.life--; }
    draw() { ctx.globalAlpha = this.life/50; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 4, 4); ctx.globalAlpha = 1.0; }
}

class Tonosama {
    constructor(x, y) { this.x=x; this.y=y; }
    draw() {
        ctx.fillStyle='#eee'; ctx.fillRect(this.x-10, this.y+20, 60, 10);
        ctx.fillStyle='#808'; ctx.fillRect(this.x, this.y+10, 40, 20);
        ctx.fillStyle='#fa0'; ctx.fillRect(this.x+15, this.y-5, 10, 10);
        if(gameState !== 'execution' && Math.floor(Date.now()/500)%2===0) { 
            ctx.fillStyle='#fff'; ctx.font='16px sans-serif'; ctx.fillText('Zzz', this.x, this.y-5); 
        }
    }
}

class Platform {
    constructor(x, y, w, h, type) {
        this.x = x; this.y = y; this.w = w; this.h = h; this.type = type || 'normal';
        this.vx = 0; this.startX = x;
        if (this.type === 'moving') { this.vx = 2; this.range = 100; }
        this.active = true; this.timer = 0;
    }
    update() {
        if(gameState === 'execution') return;
        if (this.type === 'moving') {
            this.x += this.vx; if (this.x > this.startX + this.range || this.x < this.startX - this.range) this.vx *= -1;
        } else if (this.type === 'vanish') {
            this.timer++; if (this.timer > 200) { this.active = !this.active; this.timer = 0; if(!this.active) audio.playSfx('vanish'); }
        }
    }
    draw() {
        if (this.type === 'vanish' && !this.active) { ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fillRect(this.x, this.y, this.w, this.h); return; }
        if (this.type === 'moving') ctx.fillStyle = '#68a'; else if (this.type === 'vanish') ctx.fillStyle = '#a68'; else ctx.fillStyle = currentStage >= 4 ? '#bba' : '#643'; 
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(this.x, this.y+this.h-5, this.w, 5);
        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(this.x, this.y, this.w, 2);
    }
}

function initStage(stage) {
    platforms = []; enemies = []; projectiles = []; particles = []; tonosama = null;
    let hp = ninja ? ninja.hp : 3; let ammo = ninja ? ninja.shurikens : 5;
    ninja = new Ninja(50, 500); ninja.hp = hp; ninja.shurikens = ammo;
    platforms.push(new Platform(0, 550, 800, 50, 'normal'));

    if(stage === 1) { 
        for(let i=0; i<5; i++) { platforms.push(new Platform(200 + (i%2)*300, 460 - i*90, 200, 20)); if(i>0) enemies.push(new Enemy(250 + (i%2)*300, 420 - i*90, 'ashigaru')); }
        platforms.push(new Platform(700, 50, 100, 20));
    } else if(stage === 2) { 
        platforms.push(new Platform(0, 430, 250, 20)); platforms.push(new Platform(550, 430, 250, 20)); platforms.push(new Platform(250, 300, 300, 20));
        platforms.push(new Platform(50, 170, 200, 20)); platforms.push(new Platform(550, 170, 200, 20)); platforms.push(new Platform(300, 70, 200, 20));
        enemies.push(new Enemy(300, 260, 'musha')); enemies.push(new Enemy(600, 130, 'samurai'));
    } else if(stage === 3) { 
        platforms.push(new Platform(300, 450, 300, 20)); platforms.push(new Platform(100, 350, 150, 20)); platforms.push(new Platform(650, 350, 150, 20));
        platforms.push(new Platform(350, 230, 200, 20)); platforms.push(new Platform(700, 120, 100, 20));
        enemies.push(new Enemy(400, 410, 'musha')); enemies.push(new Enemy(400, 190, 'samurai'));
    } else if(stage === 4) { 
        platforms.push(new Platform(0, 420, 200, 20)); platforms.push(new Platform(200, 320, 150, 20, 'moving'));
        platforms.push(new Platform(400, 220, 150, 20, 'vanish')); platforms.push(new Platform(600, 120, 150, 20, 'moving'));
        platforms.push(new Platform(700, 50, 100, 20));
        enemies.push(new Enemy(50, 380, 'samurai')); enemies.push(new Enemy(300, 510, 'ashigaru')); enemies.push(new Enemy(500, 510, 'musha'));
    } else if(stage === 5) { 
        tonosama = new Tonosama(700, 520); enemies.push(new Enemy(400, 510, 'musha')); enemies.push(new Enemy(600, 510, 'samurai'));
    }
}

function drawBackground(stage) {
    let grad = ctx.createLinearGradient(0, 0, 0, 600);
    if(stage <= 2) { grad.addColorStop(0, '#050510'); grad.addColorStop(1, '#101025'); } 
    else if(stage <= 4) { grad.addColorStop(0, '#000'); grad.addColorStop(1, '#200505'); } 
    else { grad.addColorStop(0, '#201000'); grad.addColorStop(1, '#402000'); }
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 800, 600);
    ctx.shadowBlur = 60; ctx.shadowColor = '#ffffaa'; ctx.fillStyle = '#ffffe0'; ctx.beginPath(); ctx.arc(700, 80, 50, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
    
    ctx.save();
    if(stage===4) { 
        for(let x=0; x<800; x+=100) { ctx.fillStyle = '#887766'; ctx.globalAlpha = 0.3; ctx.fillRect(x+10, 100, 80, 400); ctx.globalAlpha = 1.0; ctx.fillStyle = '#210'; ctx.strokeRect(x+10, 100, 80, 400); }
    } else if(stage===5) {
        ctx.fillStyle = '#321'; for(let x=0; x<800; x+=10) ctx.fillRect(x, 0, 8, 150);
        ctx.fillStyle = '#a22'; ctx.fillRect(0, 140, 800, 10);
        ctx.fillStyle = '#b00'; ctx.fillRect(0, 400, 800, 10); ctx.fillRect(0, 500, 800, 10);
        for(let x=50; x<800; x+=100) ctx.fillRect(x, 400, 10, 100);
        ctx.fillStyle = '#111'; ctx.fillRect(0, 550, 800, 5);
    }
    ctx.restore();
}

function triggerTenchu() {
    gameState = 'execution'; executionTimer = EXECUTION_DURATION; 
    audio.stopBgm(); audio.playSfx('critical'); 
    for(let i=0; i<50; i++) particles.push(new Particle(tonosama.x + 20, tonosama.y + 10, '#d00', 10));
}

function update() {
    if(gameState === 'start' || gameState === 'gameover' || gameState === 'win') return;

    if (gameState === 'execution') {
        executionTimer--;
        drawBackground(currentStage); platforms.forEach(p => p.draw()); if(tonosama) tonosama.draw(); ninja.draw();
        particles.forEach(p => { p.update(); p.draw(); }); 
        ctx.save();
        if (executionTimer > EXECUTION_DURATION - 20) { ctx.fillStyle = `rgba(255, 255, 255, ${(executionTimer - (EXECUTION_DURATION-20))/20})`; ctx.fillRect(0, 0, 800, 600); }
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.beginPath(); ctx.moveTo(0, 600); ctx.lineTo(800, 0); ctx.stroke();
        ctx.font = 'bold 130px "Yuji Syuku", serif'; ctx.textAlign = 'center';
        ctx.shadowColor = '#f00'; ctx.shadowBlur = 30; ctx.strokeStyle = '#800'; ctx.lineWidth = 8; ctx.strokeText("天　誅", 400, 300);
        ctx.shadowBlur = 0; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeText("天　誅", 400, 300);
        ctx.fillStyle = '#000'; ctx.fillText("天　誅", 400, 300);
        ctx.restore();
        if (executionTimer <= 0) gameWin();
        return;
    }
    
    platforms.forEach(p => p.update());
    drawBackground(currentStage);
    platforms.forEach(p => p.draw());
    ninja.update(platforms); ninja.draw();
    enemies.forEach(e => { e.update(); e.draw(); });
    projectiles.forEach(p => { 
        p.update(); p.draw(); 
        enemies.forEach(e => { if(!e.dead && Math.abs(p.x - e.x) < 30 && Math.abs(p.y - e.y) < 30) { e.takeDamage(10); p.active = false; } });
    });
    projectiles = projectiles.filter(p => p.active);
    particles.forEach(p => { p.update(); p.draw(); }); particles = particles.filter(p => p.life > 0);
    if(tonosama) tonosama.draw();

    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, 800, 50);
    ctx.fillStyle = '#fff'; ctx.font = '24px "Sawarabi Mincho"'; ctx.fillText(`階層: ${currentStage}  命: ${ninja.hp}  手裏剣: ${ninja.shurikens}`, 30, 35);

    if (currentStage < STAGE_MAX) {
        if(ninja.y < 40) { currentStage++; initStage(currentStage); }
    } else {
        if(tonosama && Math.abs(ninja.x - tonosama.x) < 60 && KEYS.z) triggerTenchu();
    }
    if(ninja.hp <= 0) gameOver();
    animFrameCount++;
    loopId = requestAnimationFrame(update);
}

function toggleOverlay(show, title, btnText) {
    const overlay = document.getElementById('overlay');
    const titleEl = document.getElementById('title');
    const missionEl = document.getElementById('mission');
    const btn = document.getElementById('startBtn');
    
    overlay.style.display = show ? 'flex' : 'none';
    if(show) { titleEl.innerText = title; btn.innerText = btnText; missionEl.style.display = 'none'; }
}

function startGame() {
    if(loopId) cancelAnimationFrame(loopId);
    audio.resume(); audio.playBgm('stealth');
    toggleOverlay(false);
    gameState = 'playing'; currentStage = 1;
    ninja = null; platforms = []; enemies = []; projectiles = []; particles = []; tonosama = null;
    initStage(1); update();
}

function gameOver() {
    if(gameState === 'gameover') return;
    gameState = 'gameover'; audio.stopBgm(); toggleOverlay(true, "無念...", "再挑戦");
}

function gameWin() {
    if(gameState === 'win') return;
    gameState = 'win'; audio.playBgm('action'); toggleOverlay(true, "天誅完了", "最初に戻る");
}

document.getElementById('startBtn').onclick = startGame;
</script>
