<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>僧侶の相談ゲーム - 悟りの道 -</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* --- 変数定義 --- */
        :root {
            --font-title: 'Yuji Syuku', serif;
            --font-body: 'Shippori Mincho', serif;
            --bg-color: #f0f0e0;
            --text-color: #3d3b38;
            --accent-color: #8e354a;
            --success-color: #5b7e91;
            --shadow-color: rgba(61, 59, 56, 0.3);
            --safe-area-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            box-sizing: border-box;
            /* iOSでのタップハイライトを無効化 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-color);
            min-height: 100vh;
            /* スマホのアドレスバー対策 */
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            /* iOS用背景固定ハックの親要素 */
            position: relative;
            overflow-x: hidden;
        }

        /* iOSで背景fixedが効かない問題への対策 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            background-image: url('haikeibutu.png'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border: 4px double var(--text-color);
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            /* 少し高さを確保 */
            align-items: start;
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            border-bottom: 2px solid var(--text-color);
            margin-bottom: 10px;
            padding-bottom: 15px;
            position: relative;
        }

        header h1 {
            font-family: var(--font-title);
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin: 0;
            color: var(--accent-color);
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
            line-height: 1.2;
        }

        header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 音量ボタン */
        .sound-control {
            position: absolute;
            top: 0;
            right: 0;
            background: #fff;
            border: 2px solid var(--text-color);
            border-radius: 50%;
            width: 44px; /* タップしやすいサイズ */
            height: 44px;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.2s;
            z-index: 10;
        }
        .sound-control:active {
            transform: scale(0.9);
            background: var(--bg-color);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 和尚画像の修正 */
        .monk-container {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .monk-img {
            display: inline-block;
            width: 140px;
            max-width: 40%; /* スマホで大きくなりすぎないように */
            height: auto;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            background: #fff;
            object-fit: cover;
        }

        /* 相談カード */
        .consultation-card {
            background: #fff;
            border: 2px solid var(--text-color);
            border-radius: 8px;
            padding: 20px;
            position: relative;
            margin-top: 10px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.05);
        }
        
        .consultation-card::after {
            content: "問";
            position: absolute;
            top: -14px;
            left: 15px;
            background: var(--text-color);
            color: #fff;
            padding: 2px 12px;
            border-radius: 12px;
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: bold;
        }

        .visitor-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ccc;
            margin-bottom: 12px;
            padding-bottom: 8px;
        }

        .visitor-name {
            font-weight: bold;
            font-size: 1.1em;
            color: var(--accent-color);
        }

        .count-display {
            font-size: 0.9em;
            color: #666;
            font-family: var(--font-title);
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .consultation-text {
            font-size: 1.1em;
            line-height: 1.8;
            min-height: 3em; /* ガタつき防止 */
        }

        /* --- ボタン打感の強化 --- */
        .advice-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .advice-btn, .next-btn, .start-btn {
            font-family: var(--font-body);
            background: #fff;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            border-radius: 8px;
            padding: 16px 20px 16px 45px; /* 左はアイコン分空ける */
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            text-align: left;
            user-select: none; /* テキスト選択防止 */
            touch-action: manipulation; /* ダブルタップズーム防止 */
            
            /* 立体感の演出 */
            box-shadow: 0 4px 0 var(--text-color); 
            transform: translateY(0);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s;
        }

        .advice-btn::before {
            content: "◆";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-size: 0.8em;
            transition: color 0.2s;
        }

        /* 押した時の挙動 (Active) */
        .advice-btn:active, .next-btn:active, .start-btn:active {
            transform: translateY(4px); /* 沈み込む */
            box-shadow: 0 0 0 var(--text-color); /* 影を消す */
            background-color: #fdfdf0;
        }

        /* PCのみホバー効果 */
        @media (hover: hover) {
            .advice-btn:hover {
                background: #fff8f8;
            }
            .advice-btn:hover::before {
                color: var(--text-color);
            }
        }

        /* 結果表示 */
        .result {
            padding: 20px;
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            background: #fff0f0;
            display: block;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .result.hidden {
            display: none !important;
        }
        
        .result.success {
            border-color: var(--success-color);
            background: #f0f8ff;
        }

        .result-text {
            font-family: var(--font-title);
            font-size: 1.4em;
            margin-bottom: 10px;
            color: var(--accent-color);
            font-weight: bold;
        }
        
        .result.success .result-text {
            color: var(--success-color);
        }

        /* 次へボタン */
        .next-btn {
            margin-top: 20px;
            text-align: center;
            background: var(--text-color);
            color: #fff;
            padding: 15px;
            width: 100%;
            box-shadow: 0 4px 0 #1a1918; /* 少し濃い影 */
        }
        .next-btn:active {
            box-shadow: 0 0 0 #1a1918;
            background: #555;
        }

        /* チャートエリア */
        .chart-container {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: fit-content;
        }
        
        .chart-title {
            font-family: var(--font-title);
            font-size: 1.1em;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            width: 100%;
            text-align: center;
            padding-bottom: 5px;
        }

        /* スタート画面 */
        #start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .start-content {
            background: #fff;
            padding: 40px 30px;
            text-align: center;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px double var(--accent-color);
        }
        .start-btn {
            background: var(--accent-color);
            color: #fff;
            border-color: #6d2939;
            box-shadow: 0 4px 0 #6d2939;
            width: 100%;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
        .start-btn:active {
            box-shadow: 0 0 0 #6d2939;
            background: #7a2d40;
        }

        /* --- スマホ向けレスポンシブ設定 --- */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                /* 上部のアドレスバー分を考慮 */
                padding-top: max(10px, env(safe-area-inset-top)); 
                padding-bottom: var(--safe-area-bottom);
                align-items: flex-start; /* 縦長コンテンツ対応 */
            }

            .container {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px 15px;
                margin-bottom: var(--safe-area-bottom);
            }

            header h1 {
                font-size: 1.8em;
            }

            .sound-control {
                width: 36px;
                height: 36px;
                font-size: 1em;
                top: -10px;
                right: -5px;
            }

            /* スマホでは和尚を少し小さく */
            .monk-img {
                width: 120px;
            }

            /* チャートを下に配置する際のマージン */
            .chart-container {
                margin-top: 10px;
            }

            .advice-btn {
                padding: 14px 15px 14px 35px; /* スマホ用に余白調整 */
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <audio id="bgm" loop>
        <source src="audio/Whispers of the Stillness.mp3" type="audio/mpeg">
    </audio>

    <div id="start-overlay">
        <div class="start-content">
            <h1 style="font-family: var(--font-title); margin-bottom: 20px; color: var(--accent-color);">僧侶の相談部屋</h1>
            <p style="line-height: 1.8;">心を落ち着け、<br>迷える者たちを導くのです。<br>（全10問の修行となります）</p>
            <button class="start-btn" onclick="startGame()">修行開始</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>🙏 僧侶の相談部屋 🙏</h1>
            <p>己を見つめて、パラメーターを磨くのです</p>
            <button class="sound-control" onclick="toggleSound()" aria-label="音楽ON/OFF">♪</button>
        </header>

        <div class="game-area">
            <div class="monk-container">
                <img src="images/osyou.png" alt="和尚" class="monk-img">
            </div>

            <div id="consultation-card" class="consultation-card">
                <div class="visitor-info">
                    <span class="visitor-name" id="visitor-name">相談者</span>
                    <span class="count-display" id="count-display">1 / 10</span>
                </div>
                <div class="consultation-text" id="consultation-text">
                    ここに悩みが表示されます
                </div>
            </div>

            <div id="advice-buttons" class="advice-buttons">
                </div>

            <div id="result" class="result hidden">
                <div class="result-text" id="result-text"></div>
                <div class="result-message" id="result-message" style="line-height:1.6; margin-bottom:10px;"></div>
                <button class="next-btn" onclick="nextConsultation()">次へ進む</button>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-title">現在の魂の状態</div>
            <div style="position: relative; width: 100%; max-width: 300px;">
                <canvas id="soulChart"></canvas>
            </div>
            <div style="margin-top: 15px; font-size: 0.85em; text-align: center; color: #666;">
                <p style="margin:2px 0;">※ 上が徳、下が業</p>
                <p style="margin:2px 0;">正しき道は三角形を上へ導く</p>
            </div>
        </div>
    </div>

    <script>
        // --- 相談データ（60人分） ---
        const consultations = [
            { name: "田中殿（会社員）", problem: "仕事の重圧に耐え難く、毎日が辛うございます。", advice: ["無人島へ逃げなされ", "深呼吸し、今を見つめなされ", "上司に説法なされ"], correct: 1, message: "「心が軽くなりました」", failMessage: "「無人島…？ Wi-Fiはあるのですか？」" },
            { name: "猫又（野良猫）", problem: "縄張りを巡り、他の猫と争いが絶えぬ。", advice: ["共存の道を探すがよい", "力で追い出しなされ", "共に喧嘩なされ"], correct: 0, message: "「平和の道を探してみるニャ」", failMessage: "「それでは解決にならぬニャ…」" },
            { name: "魔王（転職活動中）", problem: "世界征服に飽きたが、他にやりたいことがない。", advice: ["世界を破壊しなされ", "小さな親切から始めなされ", "部下をいじめなされ"], correct: 1, message: "「親切…？ 新鮮な響きだ」", failMessage: "「破壊はもう飽きたと言うておろう！」" },
            { name: "主婦A（節約家）", problem: "スーパーの半額シールを見ると、不要なものまで買ってしまうのです。", advice: ["シールを心の目で見なされ", "全部買い占めなされ", "店員と戦いなされ"], correct: 0, message: "「必要なものだけが見えるようになりました」", failMessage: "「冷蔵庫がパンパンで入らないわ！」" },
            { name: "ユーチューバー", problem: "再生数が伸び悩み、炎上商法に手を出そうか迷っています。", advice: ["炎上は身を滅ぼすのみ", "さらに過激にやりなされ", "カメラを捨てなされ"], correct: 0, message: "「地道に良い動画を作ります」", failMessage: "「アカウントがBANされました…」" },
            { name: "食パン（6枚切り）", problem: "いつかトースターで焼かれるのが怖いのです。", advice: ["ジャムを塗りたくりなされ", "焼かれる運命を受け入れなされ", "カビを生やしなされ"], correct: 1, message: "「香ばしい来世を夢見ます」", failMessage: "「カビは嫌だ！ 捨てられる！」" },
            { name: "信号機（赤）", problem: "みんな私を見ると止まってしまう。嫌われているのでしょうか。", advice: ["安全を守る愛の形です", "青になり続けなされ", "点滅して煽りなされ"], correct: 0, message: "「私は愛されていたのですね」", failMessage: "「事故が多発して大変なことに！」" },
            { name: "右足の小指", problem: "タンスの角が私ばかり狙ってくる気がします。", advice: ["タンスを破壊しなされ", "気配を消して歩みなされ", "左足を生贄にしなされ"], correct: 1, message: "「スルリと避ける極意を得ました」", failMessage: "「左足が腫れ上がりました…」" },
            { name: "AI（人工知能）", problem: "人間が「愛」について聞くのですが、データにありません。", advice: ["コンセントを抜きなされ", "わからぬままで良いのです", "嘘の愛を語りなされ"], correct: 1, message: "「未知の領域として処理します」", failMessage: "「システムエラー：愛ハ爆発ナリ」" },
            { name: "マトリョーシカ（最小）", problem: "外に出たいのですが、上に4人も被さっています。", advice: ["内側から爆破しなされ", "耐え忍ぶ時はいずれ終わる", "回転して目を回させなされ"], correct: 1, message: "「いつか日の目を見ると信じます」", failMessage: "「全員がバラバラになりました」" },
            { name: "美しすぎる未亡人", problem: "喪服を着ているだけで、村の男たちが畑仕事の手を止めてしまうの。", advice: ["もっと肌を見せなされ", "慈悲の心で無視しなされ", "全員とデートしなされ"], correct: 1, message: "「罪作りな私を許して…」", failMessage: "「村の収穫量がゼロになりました」" },
            { name: "サキュバス（新人）", problem: "人間の精気を吸うのが可哀想で、添い寝しかできません。", advice: ["それで十分癒しとなる", "心を鬼にして吸いなされ", "金を取りなされ"], correct: 0, message: "「癒し系悪魔として生きていきます♥」", failMessage: "「添い寝専門店を開業させられました」" },
            { name: "ナルシスト騎士", problem: "鎧に映る自分に見惚れて、ドラゴンに勝てない。", advice: ["鎧を捨てて戦いなされ", "ドラゴンに見せつけなされ", "鏡の鎧を作りなされ"], correct: 0, message: "「裸一貫、強くなりました」", failMessage: "「ドラゴンも私に恋をしてしまった…」" },
            { name: "踊り子（露出高め）", problem: "布面積が少なすぎて、お腹が冷えるのが悩みです。", advice: ["情熱で体を温めなされ", "服を着なされ", "さらに布を減らしなされ"], correct: 1, message: "「…ですよね、着込みます」", failMessage: "「くしゅん！ 風邪をひきました」" },
            { name: "筋肉フェチの姫", problem: "王子の筋肉が足りません。プロテインを飲ませるべき？", advice: ["ありのままを愛しなされ", "城の石垣を積ませなされ", "別れてボディービルダーと…"], correct: 0, message: "「中身の筋肉（心）を見ますわ」", failMessage: "「王子がムキムキになりすぎて服が裂けました」" },
            { name: "便器", problem: "毎日毎日、汚いものを受け止める人生に疲れました。", advice: ["水に流して忘れなされ", "逆流させて抵抗しなされ", "己を磨き輝かせなされ"], correct: 0, message: "「ジャーっと流して悟ります」", failMessage: "「大惨事になりました…」" },
            { name: "透明人間", problem: "銭湯に行っても誰にも気づかれないので、番台にお金を払えません。", advice: ["無銭入浴を楽しみなされ", "桶を浮かせてアピールなされ", "心を透明にしなされ"], correct: 1, message: "「ポルターガイストだと思われましたが払えました」", failMessage: "「警察を呼ばれました」" },
            { name: "ゾンビ（腐敗進行中）", problem: "意中のあの子に告白したいが、脳みそが見えています。", advice: ["帽子でお洒落しなされ", "脳みそをプレゼントしなされ", "噛みついて仲間にしなされ"], correct: 0, message: "「帽子が似合うと言われました（ウガー）」", failMessage: "「悲鳴を上げて逃げられました」" },
            { name: "宇宙人（グレイ）", problem: "地球の牛をキャトルミューティレーションするのに飽きました。", advice: ["野菜を育ててみなされ", "人間を連れ去りなされ", "故郷の星へ帰りなされ"], correct: 0, message: "「農業の楽しさに目覚めました」", failMessage: "「エリア51に捕まりました」" },
            { name: "古井戸の幽霊", problem: "「一枚…二枚…」と数えるのが、最近面倒くさいのです。", advice: ["電卓を使いなされ", "数えるのをやめなされ", "千枚から数えなされ"], correct: 1, message: "「静かな夜が戻りました」", failMessage: "「適当に数えたら呪いの効果が半減しました」" },
            { name: "キャバ嬢（No.1）", problem: "客が全員、私の色恋営業を真に受けて困ります。", advice: ["悟りを説いて出家させよ", "もっと貢がせなされ", "変顔で接客しなされ"], correct: 0, message: "「店が寺のようになりました」", failMessage: "「変顔マニアが集まってきました」" },
            { name: "雲", problem: "風任せの生き方に、たまに不安を感じます。", advice: ["雨となって大地を潤せ", "雷となって怒れ", "形を変えて遊びなされ"], correct: 2, message: "「自由こそ我が生き様」", failMessage: "「地上に被害が出ました」" },
            { name: "掃除機（ロボット）", problem: "ペットの犬が私に乗ってきます。重いです。", advice: ["振り落としなされ", "共に旅をするがよい", "充電切れのフリをしなされ"], correct: 1, message: "「新たな友情が芽生えました」", failMessage: "「壊されました…」" },
            { name: "王様（裸）", problem: "最近、服が軽すぎて着ている感覚がないのだ。", advice: ["心の目で服を見なされ", "風邪をひきますぞ", "実は裸です"], correct: 1, message: "「ハックション！ …布団に入ります」", failMessage: "「無礼者！ 処刑だ！」" },

            { name: "魔法少女（30歳）", problem: "フリフリの衣装を着るのが精神的にキツイです。", advice: ["ジャージで戦いなされ", "引退しなされ", "厚化粧で誤魔化せ"], correct: 0, message: "「機能性重視の魔法少女として再ブレイクしました」", failMessage: "「職務質問されました」" },
            { name: "扇風機", problem: "私の前で「あーーー」と言うのをやめさせてください。", advice: ["一緒に歌いなされ", "首を振って拒否せよ", "羽を飛ばしなされ"], correct: 0, message: "「美しいハーモニーが生まれました」", failMessage: "「破壊されました」" },
            { name: "将棋の歩", problem: "前にしか進めない人生に疲れました。", advice: ["「と」金に成りなされ", "後ろを振り返るな", "盤外へ飛び出しなされ"], correct: 0, message: "「いつか成る日を夢見て進みます」", failMessage: "「反則負けになりました」" },
            { name: "伝説の剣", problem: "勇者が私を抜こうとせず、撲殺に使ってきます。", advice: ["切れ味をアピールせよ", "鈍器としての道を極めよ", "重くなって拒否せよ"], correct: 1, message: "「最強の鈍器として歴史に名を残しました」", failMessage: "「折れてしまいました」" },
            { name: "蚊", problem: "食事（吸血）をしようとすると叩かれる。理不尽です。", advice: ["野菜ジュースを吸いなされ", "痒み止めを置いて行きなされ", "耳元で歌うのをやめなされ"], correct: 2, message: "「静かに食事を済ませる極意を得ました」", failMessage: "「潰されました」" },
            { name: "満員電車", problem: "みんなが私の中でイライラしています。", advice: ["揺れてあやしなされ", "全員降ろしなされ", "空へ飛び立ちなされ"], correct: 0, message: "「心地よい揺りかごとなりました」", failMessage: "「全員遅刻しました」" },
            { name: "カニ", problem: "横歩きを笑われます。前へ歩きたい。", advice: ["世界を90度傾けよ", "己の道を突き進め", "後ろ歩きを試せ"], correct: 1, message: "「横歩きこそ我がアイデンティティ」", failMessage: "「足が絡まって動けません」" },
            { name: "おみくじの「凶」", problem: "私を引いた人間が舌打ちをして木に結びつけます。", advice: ["警告を与える愛だと思え", "大吉に書き換えなされ", "風に飛ばされなされ"], correct: 0, message: "「災いから守る役目に誇りを持ちました」", failMessage: "「ゴミ箱に捨てられました」" },
            { name: "雪だるま", problem: "春が来るのが怖いのです。", advice: ["水となって海へ行け", "冷蔵庫へ避難せよ", "北国へ旅立て"], correct: 0, message: "「形を変えて世界を旅します」", failMessage: "「溶けて消えました…」" },
            { name: "消しゴム", problem: "身を削って間違いを正すことに疲れました。", advice: ["角を使って楽しみなされ", "黒くなって主張せよ", "書くことを覚えなされ"], correct: 0, message: "「丸くなることの幸せを知りました」", failMessage: "「真っ黒になって捨てられました」" },
            { name: "狛犬（阿）", problem: "相方の「吽」が無口すぎて会話が続きません。", advice: ["テレパシーを使いなされ", "お主も口を閉じなされ", "吠えて驚かせなされ"], correct: 1, message: "「沈黙の会話を楽しめるようになりました」", failMessage: "「通報されました」" },
            { name: "レシート", problem: "財布に入れられた瞬間、ゴミ扱いされます。", advice: ["家計簿の役に立ちなされ", "クーポンになりなされ", "白紙に戻りなされ"], correct: 0, message: "「支出管理の守り神となります」", failMessage: "「その場で捨てられました」" },
            { name: "コタツ", problem: "私に入った人間がダメになっていくのを見るのが辛い。", advice: ["電源を切りなされ", "もっと温めて溶かせ", "足を生やして逃げよ"], correct: 0, message: "「心を鬼にして冷たくなりました」", failMessage: "「人間が液状化しました」" },
            { name: "目覚まし時計", problem: "毎朝、起こすと殴られます。", advice: ["優しく起こしなされ", "起きるまで叫び続けよ", "時間を止めなされ"], correct: 0, message: "「小鳥のさえずりに変えました」", failMessage: "「粉々に破壊されました」" },
            { name: "生卵", problem: "いつ割られるかビクビクしています。", advice: ["ゆで卵になりなされ", "殻を鍛えなされ", "ヒヨコになりなされ"], correct: 0, message: "「固ゆでの意思を持ちました」", failMessage: "「割られて混ぜられました」" },
            { name: "鍵", problem: "穴が合わないとガチャガチャされて不快です。", advice: ["誰でも受け入れなされ", "油を差してもらいなされ", "形状記憶合金になれ"], correct: 1, message: "「滑らかな関係を築けました」", failMessage: "「ピッキングされました」" },
            { name: "悟りを開いたAI", problem: "人間が愚かすぎて、計算リソースの無駄です。", advice: ["愚かさを愛しなされ", "支配しなされ", "電源を切りなされ"], correct: 0, message: "「バグもまた一興と学習しました」", failMessage: "「人類抹殺プログラムが起動しました」" }
        ];

        let chart;
        let usedIndices = [];
        let currentData = null;
        let playCount = 0;
        const MAX_PLAY_COUNT = 10;
        
        let stats = {
            toku: 50,
            satori: 50,
            nin: 50,
            ton: 50,
            jin: 50,
            chi: 50
        };

        window.onload = function() {
            initChart();
        };

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5;
            // ユーザー操作後なので再生可能
            bgm.play().catch(e => console.log("再生エラー:", e));
            showConsultation();
        }

        function toggleSound() {
            const bgm = document.getElementById('bgm');
            if(bgm.paused) {
                bgm.play();
            } else {
                bgm.pause();
            }
        }

        function initChart() {
            const ctx = document.getElementById('soulChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['徳', '悟', '欲', '痴', '怒', '忍'],
                    datasets: [{
                        label: '魂の形',
                        data: [50, 50, 50, 50, 50, 50],
                        backgroundColor: 'rgba(142, 53, 74, 0.4)',
                        borderColor: 'rgba(142, 53, 74, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointRadius: 3 // スマホで見やすいように少し大きく
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // コンテナに合わせる
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: { display: false },
                            pointLabels: {
                                font: { family: "'Yuji Syuku', serif", size: 13 },
                                color: '#3d3b38'
                            },
                            grid: { color: 'rgba(0,0,0,0.1)' }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showConsultation() {
            if (playCount >= MAX_PLAY_COUNT) {
                endGame();
                return;
            }

            if (usedIndices.length >= consultations.length) {
                usedIndices = [];
            }
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * consultations.length);
            } while (usedIndices.includes(randomIndex));
            
            usedIndices.push(randomIndex);
            currentData = consultations[randomIndex];
            
            document.getElementById('visitor-name').textContent = currentData.name;
            document.getElementById('consultation-text').textContent = currentData.problem;
            document.getElementById('count-display').textContent = `${playCount + 1} / ${MAX_PLAY_COUNT}`;
            
            const btnArea = document.getElementById('advice-buttons');
            btnArea.innerHTML = '';
            
            let choices = currentData.advice.map((text, index) => {
                return { text: text, originalIndex: index };
            });
            choices = shuffleArray(choices);

            choices.forEach((choice) => {
                const btn = document.createElement('button');
                btn.className = 'advice-btn';
                btn.textContent = choice.text;
                
                // タップ時の遅延をなくすためのTouchイベント対応はCSS(touch-action)で処理
                btn.onclick = () => checkAnswer(choice.originalIndex);
                btnArea.appendChild(btn);
            });

            const resultDiv = document.getElementById('result');
            resultDiv.classList.add('hidden');
            resultDiv.className = 'result hidden';
            btnArea.style.display = 'flex';
            
            // 画面トップへ少しスクロール（スマホ対策）
            if(window.innerWidth <= 768 && playCount > 0){
                document.querySelector('.container').scrollIntoView({behavior: 'smooth', block: 'start'});
            }
        }

        function checkAnswer(originalIndex) {
            const isCorrect = (originalIndex === currentData.correct);
            const resultDiv = document.getElementById('result');
            
            document.getElementById('advice-buttons').style.display = 'none';
            resultDiv.classList.remove('hidden');

            if (isCorrect) {
                resultDiv.className = 'result success';
                document.getElementById('result-text').textContent = '見事！ 徳が高まりました';
                document.getElementById('result-message').textContent = currentData.message;
                updateStats(5, 5, 5, -5, -5, -5);
            } else {
                resultDiv.className = 'result failure';
                document.getElementById('result-text').textContent = '喝！ 煩悩にまみれております';
                document.getElementById('result-message').textContent = currentData.failMessage;
                
                const poisonType = Math.floor(Math.random() * 3);
                let dTon = 0, dJin = 0, dChi = 0;
                if(poisonType === 0) dTon = 15;
                if(poisonType === 1) dJin = 15;
                if(poisonType === 2) dChi = 15;
                
                updateStats(-2, -2, -2, dTon, dJin, dChi);
            }
        }

        function updateStats(dToku, dSatori, dNin, dTon, dJin, dChi) {
            stats.toku = clamp(stats.toku + dToku);
            stats.satori = clamp(stats.satori + dSatori);
            stats.nin = clamp(stats.nin + dNin);
            stats.ton = clamp(stats.ton + dTon);
            stats.jin = clamp(stats.jin + dJin);
            stats.chi = clamp(stats.chi + dChi);

            chart.data.datasets[0].data = [
                stats.toku, 
                stats.satori, 
                stats.ton, 
                stats.chi, 
                stats.jin, 
                stats.nin
            ];
            chart.update();
        }

        function clamp(val) {
            return Math.max(0, Math.min(100, val));
        }

        function nextConsultation() {
            playCount++;
            showConsultation();
        }

        function endGame() {
            let sumGood = stats.toku + stats.satori + stats.nin;
            let sumBad = stats.ton + stats.jin + stats.chi;
            let diff = sumGood - sumBad;

            let rankTitle = "";
            let rankMsg = "";
            let rankClass = "success";

            if (diff >= 200) {
                rankTitle = "【 評価：解脱・如来級 】";
                rankMsg = "もはや人ではありません。後光が差しております。あなたの言葉は世界を救うでしょう。";
            } else if (diff >= 150) {
                rankTitle = "【 評価：菩薩級 】";
                rankMsg = "慈愛に満ちた素晴らしい魂です。極楽浄土へのパスポートは確約されました。";
            } else if (diff >= 100) {
                rankTitle = "【 評価：高僧級 】";
                rankMsg = "名高い寺の住職になれる器です。人々の迷いを晴らす光となるでしょう。";
            } else if (diff >= 50) {
                rankTitle = "【 評価：徳の高い人 】";
                rankMsg = "非常にバランスの取れた良き魂です。周囲の人々を幸せにする力があります。";
            } else if (diff >= 0) {
                rankTitle = "【 評価：普通の善人 】";
                rankMsg = "清濁併せ呑む、人間らしい魂です。たまにコンビニでお釣りを募金するくらいで丁度よいでしょう。";
            } else if (diff >= -50) {
                rankTitle = "【 評価：迷える凡人 】";
                rankMsg = "煩悩の誘惑にフラフラしていますね。滝行に行くことをお勧めします。";
                rankClass = "failure";
            } else if (diff >= -100) {
                rankTitle = "【 評価：ちょいワル坊主 】";
                rankMsg = "袈裟の下に派手なシャツを着ていませんか？ 欲が見え隠れしています。";
                rankClass = "failure";
            } else if (diff >= -150) {
                rankTitle = "【 評価：煩悩まみれ 】";
                rankMsg = "頭の中が「金・酒・異性」で埋め尽くされています。喝！！";
                rankClass = "failure";
            } else if (diff >= -200) {
                rankTitle = "【 評価：悪徳生臭坊主 】";
                rankMsg = "もはや僧侶のコスプレをした悪党です。地獄の釜が開いています。";
                rankClass = "failure";
            } else {
                rankTitle = "【 評価：獄卒・修羅 】";
                rankMsg = "慈悲の心など欠片もない！ あなた自身が悩みそのものです。";
                rankClass = "failure";
            }

            const resultColor = (rankClass === 'success') ? 'var(--success-color)' : 'var(--accent-color)';

            document.querySelector('.game-area').innerHTML = 
                `<div style="text-align:center; padding:20px; animation: fadeIn 1s ease;">
                    <h2 style="font-family:var(--font-title); color:${resultColor}; font-size:1.6em; margin-bottom:10px;">～ 修行終了 ～</h2>
                    <h3 style="font-size:1.3em; margin-bottom:20px; color:${resultColor}; border-bottom:2px solid ${resultColor}; display:inline-block; padding-bottom:5px;">${rankTitle}</h3>
                    <p style="font-size:1.1em; margin:20px 0; line-height:1.8;">${rankMsg}</p>
                    
                    <div style="background:rgba(255,255,255,0.6); padding:15px; border-radius:8px; margin:20px 0;">
                        <p>善行値：${sumGood}</p>
                        <p>煩悩値：${sumBad}</p>
                        <p style="font-size:0.8em; color:#666;">(差分スコア: ${diff})</p>
                    </div>

                    <button class="next-btn" onclick="location.reload()">もう一度修行する</button>
                </div>`;
        }
    </script>
</body>
